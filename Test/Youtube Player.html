<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Player for Scratch Community</title>
    <style>
        :root {
            --scratch-orange: #ffab19;
            --scratch-blue: #4d97ff;
            --bg-color: #f9f9f9;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { color: var(--scratch-blue); font-size: 1.5rem; text-align: center; }

        /* Video Wrapper */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-nav { background-color: var(--scratch-blue); color: white; }
        .btn-nav:disabled { background-color: #ccc; }

        .settings {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        input {
            padding: 10px;
            width: 60%;
            border: 2px solid #ddd;
            border-radius: 5px;
        }

        .add-btn { background-color: var(--scratch-orange); color: white; }

        .playlist-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }

        .disclaimer {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Safe Video Player & Custom Playlists</h1>

    <div class="video-wrapper">
        <div id="player"></div>
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn-nav" onclick="prevVideo()">← Previous</button>
        <button id="nextBtn" class="btn-nav" onclick="nextVideo()">Next →</button>
    </div>

    <div id="playlistStatus" class="playlist-info">
        Video 1 of 1
    </div>

    <div class="settings">
        <h3>Playlist Settings</h3>
        <p style="font-size: 0.8rem;">Paste a YouTube link to add it to your custom playlist.</p>
        <input type="text" id="videoUrl" placeholder="YouTube Link (e.g., https://youtu.be/...)">
        <button class="add-btn" onclick="addVideo()">Add Video</button>
        <button onclick="resetPlaylist()" style="background: #ff4d4d; color: white;">Clear / Reset</button>
    </div>

    <p class="disclaimer">This tool is independent and not affiliated with Scratch or YouTube. Videos must follow the Community Guidelines.</p>
</div>

<script>
    let player;
    let playlist = [];
    let currentIndex = 0;
    const DEFAULT_VIDEO = 'dQw4w9WgXcQ'; // Rick Astley - will be used if URL is empty

    // 1. Initialize Playlist from URL
    function init() {
        const params = new URLSearchParams(window.location.search);
        const vids = params.get('vids');
        
        if (vids && vids.trim() !== "") {
            playlist = vids.split(',');
        } else {
            playlist = [DEFAULT_VIDEO];
        }
        updateUI();
    }

    // 2. YouTube API Setup
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '360',
            width: '640',
            videoId: playlist[currentIndex],
            playerVars: {
                'autoplay': 0,
                'rel': 0, // No suggested videos from other channels
                'modestbranding': 1,
                'iv_load_policy': 3, // Hide annotations
                'origin': window.location.origin
            },
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerStateChange(event) {
        // Automatically play next video when current one ends
        if (event.data === YT.PlayerState.ENDED) {
            nextVideo();
        }
    }

    // 3. Navigation Logic
    function loadCurrentVideo() {
        player.loadVideoById(playlist[currentIndex]);
        updateUI();
        updateURL();
    }

    function nextVideo() {
        if (currentIndex < playlist.length - 1) {
            currentIndex++;
            loadCurrentVideo();
        }
    }

    function prevVideo() {
        if (currentIndex > 0) {
            currentIndex--;
            loadCurrentVideo();
        }
    }

    // 4. Playlist Management
    function addVideo() {
        const input = document.getElementById('videoUrl');
        const url = input.value;
        const videoId = extractVideoID(url);

        if (videoId) {
            // If the only video is the default one, replace it
            if (playlist.length === 1 && playlist[0] === DEFAULT_VIDEO) {
                playlist = [videoId];
            } else {
                playlist.push(videoId);
            }
            
            input.value = '';
            updateUI();
            updateURL();
            
            // If we just replaced the default, load it immediately
            if (playlist.length === 1) {
                loadCurrentVideo();
            }
            
            alert("Video added! The URL in your browser is now your shareable playlist link.");
        } else {
            alert("Invalid link. Please use a standard YouTube URL.");
        }
    }

    function extractVideoID(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length == 11) ? match[2] : null;
    }

    function updateUI() {
        document.getElementById('playlistStatus').innerText = `Video ${currentIndex + 1} of ${playlist.length}`;
        document.getElementById('prevBtn').disabled = (currentIndex === 0);
        document.getElementById('nextBtn').disabled = (currentIndex === playlist.length - 1);
    }

    function updateURL() {
        const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?vids=' + playlist.join(',');
        window.history.pushState({path: newUrl}, '', newUrl);
    }

    function resetPlaylist() {
        if(confirm("Do you want to clear the playlist and return to default?")) {
            window.location.href = window.location.pathname;
        }
    }

    init();
</script>

</body>
</html>
